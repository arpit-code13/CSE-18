<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //loops :used to re
        //for loop :used when you know the number of iteration in advance

        let studentlist=["arpit " ,"abhay","dev"];

        for(let i=0; i<studentlist.length; i++){
            console.log(studentlist[i]);
        }


        //while loop...........
        let x= 0;
        while(x<studentlist.length){
            console.log(studentlist[x])
            x++;
        }

        //for ..................of :iteratioin over the value of iterable objects (like array ,string )
      for(let y of studentlist){
        console.log(y);
      }

    </script>
    
</body>
</html>
